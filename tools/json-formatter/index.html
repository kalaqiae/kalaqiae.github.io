<script data-ad-client=ca-pub-6216241935841265 async src=https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js></script><style>:root{--primary-color:#1E88E5;--primary-hover-color:#42A5F5;--secondary-color:#757575;--text-color:#212121;--card-background-base:rgba(255, 255, 255, 0.9);--border-radius:10px;--transition-speed:0.3s;--shadow-light:0 4px 15px rgba(0, 0, 0, 0.1)}body{font-family:segoe ui,Roboto,Helvetica,Arial,sans-serif;color:var(--text-color);margin:0;padding-top:80px;line-height:1.6;min-height:100vh;text-rendering:optimizeLegibility;background-image:url(/images/full-background.jpg);background-size:cover;background-position:50%;background-attachment:fixed;background-color:rgba(240,240,240,.85);background-blend-mode:lighten}main{max-width:1000px;margin:0 auto;padding:40px 20px}.text-blue-600{color:var(--primary-color)}.bg-blue-600{background-color:var(--primary-color)}.hover\:bg-blue-700:hover{background-color:var(--primary-hover-color)}</style></head><body><style>header{position:fixed;top:0;left:0;right:0;z-index:1000;background-color:rgba(255,255,255,.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 2px 10px rgba(0,0,0,.15);display:flex;justify-content:space-between;align-items:center;height:70px;padding:0 30px}.logo{flex:none}.logo a{font-size:1.6em;font-weight:700;color:#212121;text-decoration:none;text-transform:uppercase;letter-spacing:1px;transition:color .3s}.logo a:hover{color:#1e88e5}nav a{margin:0 20px;font-size:1.05em;font-weight:500;color:#757575;padding:5px 10px;border-radius:5px;transition:all .3s;text-decoration:none;display:inline-block}nav a:hover{color:#1e88e5;background-color:rgba(30,136,229,.1);transform:scale(1.05)}nav a.active{color:#1e88e5;background-color:rgba(30,136,229,.1);font-weight:600}nav{flex:1;display:flex;justify-content:center;align-items:center}.lang-switch{flex:none;display:flex;align-items:center;gap:8px;font-size:.95em;color:#757575;z-index:1}.lang-item{color:inherit;text-decoration:none;padding:4px 8px;border-radius:5px;transition:all .3s;display:inline-block}.lang-item:hover{color:#1e88e5;background-color:rgba(30,136,229,.1)}.lang-item.active{color:#1e88e5;background-color:rgba(30,136,229,.1);font-weight:600}@media(max-width:900px){.logo{display:none}}@media(max-width:768px){body{padding-top:110px}header{height:auto;flex-direction:column;padding:10px 0}nav{margin-top:5px}nav a{margin:5px 10px}.lang-switch{margin:8px 0}}</style><header><div class=logo><a href=/>KALAQIAE</a></div><nav><a href=/>首页</a>

<a href=/about/>关于</a></nav><div class=lang-switch><span class="lang-item active">中文</span>
<a class=lang-item href=/en/tools/json-formatter/>EN</a></div></header><main><div class=tool-container><div class=card-content><h1 class="text-3xl font-bold mb-6 text-gray-800 flex items-center"><svg class="w-6 h-6 mr-3 text-blue-600" fill="none" stroke="currentcolor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4 4 4-4 4M6 16l-4-4 4-4"/></svg>JSON 格式化</h1><div id=messageBox class=message-box></div><div class="grid grid-cols-1 lg:grid-cols-2 gap-6"><div><label for=inputArea class="block text-lg font-semibold mb-2 text-gray-700">输入 JSON：</label>
<textarea id=inputArea placeholder="在此粘贴 JSON..."></textarea></div><div><label for=outputArea class="block text-lg font-semibold mb-2 text-gray-700">输出结果：</label>
<textarea id=outputArea placeholder=格式化结果显示在这里...></textarea></div></div><div class="flex flex-wrap justify-center md:justify-start space-x-4 mt-6 col-span-1 lg:col-span-2"><button onclick=formatJson() class="tool-button bg-green-600 text-white hover:bg-green-700">
✨ 格式化</button>
<button onclick=minifyJson() class="tool-button bg-red-600 text-white hover:bg-red-700">
📦 压缩</button>
<button onclick=validateJson() class="tool-button bg-yellow-500 text-gray-800 hover:bg-yellow-600">

🧹 清空</button>
<button onclick=copyOutput() class="tool-button bg-gray-200 text-gray-800 hover:bg-gray-300">
📋 复制结果</button></div></div></div><style>.tool-container{max-width:1000px;margin:40px auto;padding:20px}textarea{width:100%;height:400px;padding:1rem;border:2px solid #e0e0e0;border-radius:var(--border-radius);font-family:consolas,courier new,monospace;font-size:.95rem;resize:vertical;outline:none;transition:border-color .2s;background-color:#f8f9fa}textarea:focus{border-color:var(--primary-color);box-shadow:0 0 0 3px rgba(30,136,229,.2)}.card-content{background-color:var(--card-background-base);padding:1.5rem;border-radius:var(--border-radius);box-shadow:0 8px 15px rgba(0,0,0,.1);backdrop-filter:blur(5px);border:1px solid #e0e0e0}.tool-button{padding:.75rem 1.5rem;border-radius:.5rem;font-weight:600;transition:all .2s;border:none;cursor:pointer}.tool-button:hover{box-shadow:0 4px 8px rgba(30,136,229,.4);transform:translateY(-1px)}.message-box{padding:1rem;border-radius:var(--border-radius);margin-bottom:1rem;font-weight:500;display:none}.message-box.error{background-color:#fee2e2;color:#ef4444;border:1px solid #fca5a5}.message-box.success{background-color:#d1fae5;color:#059669;border:1px solid #34d399}.message-box.info{background-color:#e3f2fd;color:#1e88e5;border:1px solid #90caf9}</style><script>const i18n={emptyInput:"输入内容不能为空。",parseFailed:"解析失败：",formatSuccess:"格式化成功。",formatFailed:"格式化失败。",minifySuccess:"压缩成功。",minifyFailed:"压缩失败。",validateSuccess:"JSON 合法。",validateFailed:"JSON 无效：",cleared:"已清空。",copyEmpty:"没有可复制内容。",copySuccess:"已复制到剪贴板。"},inputArea=document.getElementById("inputArea"),outputArea=document.getElementById("outputArea"),messageBox=document.getElementById("messageBox");function showMessage(e,t="info"){messageBox.textContent=e,messageBox.className="message-box",messageBox.classList.add(t),messageBox.style.display="block",setTimeout(()=>{messageBox.style.display="none"},5e3)}function parseInput(){messageBox.style.display="none";const e=inputArea.value.trim();if(!e)return showMessage(i18n.emptyInput,"error"),null;try{return JSON.parse(e)}catch(e){return showMessage(`${i18n.parseFailed}${e.message.substring(0,100)}...`,"error"),outputArea.value="",null}}function formatJson(){const e=parseInput();if(e===null)return;try{const t=JSON.stringify(e,null,2);outputArea.value=t,showMessage(i18n.formatSuccess,"success")}catch{showMessage(i18n.formatFailed,"error"),outputArea.value=""}}function minifyJson(){const e=parseInput();if(e===null)return;try{const t=JSON.stringify(e);outputArea.value=t,showMessage(i18n.minifySuccess,"success")}catch{showMessage(i18n.minifyFailed,"error"),outputArea.value=""}}function validateJson(){messageBox.style.display="none";const e=inputArea.value.trim();if(!e){showMessage(i18n.emptyInput,"error");return}try{JSON.parse(e),showMessage(i18n.validateSuccess,"success")}catch(e){showMessage(`${i18n.validateFailed}${e.message}`,"error")}outputArea.value=""}function clearAll(){inputArea.value="",outputArea.value="",messageBox.style.display="none",showMessage(i18n.cleared,"info")}function copyOutput(){const e=outputArea.value;if(!e){showMessage(i18n.copyEmpty,"error");return}outputArea.select(),document.execCommand("copy"),outputArea.setSelectionRange(0,0),showMessage(i18n.copySuccess,"info")}</script></main></body></html>
