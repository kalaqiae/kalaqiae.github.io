stampOutput=document.getElementById("timestampOutput"),dateTimeOutput=document.getElementById("dateTimeOutput"),currentTimeDisplay=document.getElementById("currentTimeDisplay"),currentTimestampSecond=document.getElementById("currentTimestampSecond"),messageBox=document.getElementById("messageBox");function showMessage(e,t="info"){messageBox.textContent=e,messageBox.className="message-box",messageBox.classList.add(t),messageBox.style.display="block",setTimeout(()=>{messageBox.style.display="none"},5e3)}function getTimezoneString(){const e=(new Date).getTimezoneOffset(),n=e>0?"-":"+",t=Math.abs(e),s=String(Math.floor(t/60)).padStart(2,"0"),o=String(t%60).padStart(2,"0");return`(UTC${n}${s}:${o})`}function formatLocalTime(e){const t=e.getFullYear(),n=String(e.getMonth()+1).padStart(2,"0"),s=String(e.getDate()).padStart(2,"0"),o=String(e.getHours()).padStart(2,"0"),i=String(e.getMinutes()).padStart(2,"0"),a=String(e.getSeconds()).padStart(2,"0"),r=String(e.getMilliseconds()).padStart(3,"0");return`${t}-${n}-${s} ${o}:${i}:${a}.${r}`}function updateCurrentTime(){const e=new Date;currentTimeDisplay.textContent=formatLocalTime(e)+" "+getTimezoneString(),currentTimestampSecond.textContent=Math.floor(e.getTime()/1e3)}setInterval(updateCurrentTime,100),updateCurrentTime();function parseLocalTime(e){const n=e.match(/(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2}):(\d{2})\.?(\d{0,3})?/);if(!n)return null;const t=n.slice(1,7).map(Number),s=n[7]?Number(n[7].padEnd(3,"0")):0;return new Date(t[0],t[1]-1,t[2],t[3],t[4],t[5],s)}function convertToTimestamp(){messageBox.style.display="none";const e=dateTimeInput.value.trim();if(!e){showMessage(i18n.emptyDatetime,"error"),timestampOutput.value="";return}try{const t=parseLocalTime(e);if(!t||isNaN(t.getTime())){showMessage(i18n.invalidDatetime,"error"),timestampOutput.value="";return}const s=document.querySelector('input[name="precision"]:checked').value;let n;s==="second"?n=Math.floor(t.getTime()/1e3):n=t.getTime(),timestampOutput.value=n.toString(),showMessage(s==="second"?i18n.convertSuccessSecond:i18n.convertSuccessMillisecond)}catch(e){showMessage(i18n.convertError,"error"),console.error("Conversion Error:",e)}}function convertToDateTime(){messageBox.style.display="none";let e=timestampInput.value.trim();if(!e){showMessage(i18n.emptyTimestamp,"error"),dateTimeOutput.value="";return}if(e=e.replace(/\D/g,""),e.length!==10&&e.length!==13){showMessage(i18n.invalidTimestampLength,"error"),dateTimeOutput.value="";return}let n=parseInt(e,10),t;if(e.length===10?(t=new Date(n*1e3),showMessage(i18n.convertedSecond)):(t=new Date(n),showMessage(i18n.convertedMillisecond)),isNaN(t.getTime())){showMessage(i18n.invalidTimestamp,"error"),dateTimeOutput.value="";return}dateTimeOutput.value=formatLocalTime(t)}function getCurrentTime(){const e=new Date;dateTimeInput.value=formatLocalTime(e),showMessage(i18n.filledCurrent,"info")}function copyTimestamp(e){let t;if(e==="second"?t=currentTimestampSecond.textContent:t=timestampOutput.value,!t){showMessage(i18n.emptyCopy,"error");return}const n=document.createElement("input");n.value=t,document.body.appendChild(n),n.select(),document.execCommand("copy"),document.body.removeChild(n),showMessage(i18n.copied,"info")}function clearAll(){dateTimeInput.value="",timestampInput.value="",timestampOutput.value="",dateTimeOutput.value="",messageBox.style.display="none",showMessage(i18n.cleared,"info")}</script></main></body></html>
