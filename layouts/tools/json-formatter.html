{{ define "title" }}{{ T "json.pageTitle" }} - {{ .Site.Title }}{{ end }}

{{ define "main" }}
<div class="tool-container">
    <div class="card-content">
        <h1 class="text-3xl font-bold mb-6 text-gray-800 flex items-center">
            <svg class="w-6 h-6 mr-3 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
            </svg>
            {{ T "json.title" }}
        </h1>

        <!-- 错误和消息提示区 -->
        <div id="messageBox" class="message-box"></div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- 左侧：输入区 -->
            <div>
                <label for="inputArea" class="block text-lg font-semibold mb-2 text-gray-700">{{ T "json.input.label" }}</label>
                <textarea id="inputArea" placeholder="{{ T "json.input.placeholder" }}"></textarea>
            </div>

            <!-- 右侧：输出区 -->
            <div>
                <label for="outputArea" class="block text-lg font-semibold mb-2 text-gray-700">{{ T "json.output.label" }}</label>
                <textarea id="outputArea" placeholder="{{ T "json.output.placeholder" }}"></textarea>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="flex flex-wrap justify-center md:justify-start space-x-4 mt-6 col-span-1 lg:col-span-2">
            <button onclick="formatJson()" class="tool-button bg-green-600 text-white hover:bg-green-700">
                ✨ {{ T "json.action.format" }}
            </button>
            <button onclick="minifyJson()" class="tool-button bg-red-600 text-white hover:bg-red-700">
                📦 {{ T "json.action.minify" }}
            </button>
            <button onclick="validateJson()" class="tool-button bg-yellow-500 text-gray-800 hover:bg-yellow-600">
                ✅ {{ T "json.action.validate" }}
            </button>
            <button onclick="clearAll()" class="tool-button bg-gray-200 text-gray-800 hover:bg-gray-300">
                🧹 {{ T "json.action.clear" }}
            </button>
            <button onclick="copyOutput()" class="tool-button bg-gray-200 text-gray-800 hover:bg-gray-300">
                📋 {{ T "json.action.copy" }}
            </button>
        </div>
    </div>
</div>

<style>
    .tool-container {
        max-width: 1000px;
        margin: 40px auto;
        padding: 20px;
    }

    /* 文本输入框样式 */
    textarea {
        width: 100%;
        height: 400px;
        /* 增加高度以容纳更多 JSON */
        padding: 1rem;
        border: 2px solid #E0E0E0;
        border-radius: var(--border-radius);
        font-family: 'Consolas', 'Courier New', monospace;
        /* 适合代码的字体 */
        font-size: 0.95rem;
        resize: vertical;
        /* 允许垂直拖动 */
        outline: none;
        transition: border-color 0.2s;
        background-color: #F8F9FA;
    }

    textarea:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(30, 136, 229, 0.2);
    }

    .card-content {
        background-color: var(--card-background-base);
        padding: 1.5rem;
        border-radius: var(--border-radius);
        box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
        backdrop-filter: blur(5px);
        border: 1px solid #E0E0E0;
    }

    /* 按钮动画 */
    .tool-button {
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        font-weight: 600;
        transition: all 0.2s;
        border: none;
        cursor: pointer;
    }

    .tool-button:hover {
        box-shadow: 0 4px 8px rgba(30, 136, 229, 0.4);
        transform: translateY(-1px);
    }

    /* 消息提示框 */
    .message-box {
        padding: 1rem;
        border-radius: var(--border-radius);
        margin-bottom: 1rem;
        font-weight: 500;
        display: none;
        /* 默认隐藏 */
    }

    .message-box.error {
        background-color: #FEE2E2;
        color: #EF4444;
        border: 1px solid #FCA5A5;
    }

    .message-box.success {
        background-color: #D1FAE5;
        color: #059669;
        border: 1px solid #34D399;
    }

    .message-box.info {
        background-color: #E3F2FD;
        color: #1E88E5;
        border: 1px solid #90CAF9;
    }
</style>

<script>
    const i18n = {
        emptyInput: '{{ T "json.message.emptyInput" }}',
        parseFailed: '{{ T "json.message.parseFailed" }}',
        formatSuccess: '{{ T "json.message.formatSuccess" }}',
        formatFailed: '{{ T "json.message.formatFailed" }}',
        minifySuccess: '{{ T "json.message.minifySuccess" }}',
        minifyFailed: '{{ T "json.message.minifyFailed" }}',
        validateSuccess: '{{ T "json.message.validateSuccess" }}',
        validateFailed: '{{ T "json.message.validateFailed" }}',
        cleared: '{{ T "json.message.cleared" }}',
        copyEmpty: '{{ T "json.message.copyEmpty" }}',
        copySuccess: '{{ T "json.message.copySuccess" }}'
    };

    const inputArea = document.getElementById('inputArea');
    const outputArea = document.getElementById('outputArea');
    const messageBox = document.getElementById('messageBox');

    /**
     * 显示消息提示
     */
    function showMessage(message, type = 'info') {
        messageBox.textContent = message;
        messageBox.className = 'message-box'; // 重置类
        messageBox.classList.add(type);
        messageBox.style.display = 'block';

        // 5秒后自动隐藏
        setTimeout(() => {
            messageBox.style.display = 'none';
        }, 5000);
    }

    /**
     * 核心函数：解析输入 JSON 文本
     * @returns {object|null} 解析后的 JavaScript 对象，如果失败返回 null
     */
    function parseInput() {
        messageBox.style.display = 'none';
        const input = inputArea.value.trim();

        if (!input) {
            showMessage(i18n.emptyInput, 'error');
            return null;
        }

        try {
            // 尝试解析 JSON
            return JSON.parse(input);
        } catch (e) {
            showMessage(`${i18n.parseFailed}${e.message.substring(0, 100)}...`, 'error');
            outputArea.value = "";
            return null;
        }
    }

    /**
     * 格式化 (Beautify) JSON
     */
    function formatJson() {
        const obj = parseInput();
        if (obj === null) return;

        try {
            // 使用 JSON.stringify 的第三个参数设置缩进 (2个空格)
            const formatted = JSON.stringify(obj, null, 2);
            outputArea.value = formatted;
            showMessage(i18n.formatSuccess, 'success');
        } catch (e) {
            showMessage(i18n.formatFailed, 'error');
            outputArea.value = "";
        }
    }

    /**
     * 压缩 (Minify) JSON
     */
    function minifyJson() {
        const obj = parseInput();
        if (obj === null) return;

        try {
            // 不使用缩进 (null, 0 或不传参)
            const minified = JSON.stringify(obj);
            outputArea.value = minified;
            showMessage(i18n.minifySuccess, 'success');
        } catch (e) {
            showMessage(i18n.minifyFailed, 'error');
            outputArea.value = "";
        }
    }

    /**
     * 验证 (Validate) JSON
     */
    function validateJson() {
        messageBox.style.display = 'none';
        const input = inputArea.value.trim();

        if (!input) {
            showMessage(i18n.emptyInput, 'error');
            return;
        }

        try {
            JSON.parse(input);
            showMessage(i18n.validateSuccess, 'success');
        } catch (e) {
            showMessage(`${i18n.validateFailed}${e.message}`, 'error');
        }
        outputArea.value = ""; // 验证通常不需要改变输出框
    }

    /**
     * 清空所有输入和输出
     */
    function clearAll() {
        inputArea.value = "";
        outputArea.value = "";
        messageBox.style.display = 'none';
        showMessage(i18n.cleared, 'info');
    }

    /**
     * 复制输出结果到剪贴板
     */
    function copyOutput() {
        const output = outputArea.value;
        if (!output) {
            showMessage(i18n.copyEmpty, 'error');
            return;
        }

        // 使用 document.execCommand('copy') 兼容性更好 (iframe 环境)
        outputArea.select();
        document.execCommand('copy');
        outputArea.setSelectionRange(0, 0); // 取消选中

        showMessage(i18n.copySuccess, 'info');
    }
</script>
{{ end }}
