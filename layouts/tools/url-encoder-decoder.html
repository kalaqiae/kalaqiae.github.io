{{ define "title" }}{{ T "url.pageTitle" }} - {{ .Site.Title }}{{ end }}

{{ define "main" }}
<div class="tool-container">
    <div class="card-content">
        <h1 class="text-3xl font-bold mb-6 text-gray-800 flex items-center">
            <svg class="w-6 h-6 mr-3 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.879a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1">
                </path>
            </svg>
            {{ T "url.title" }}
        </h1>

        <!-- 错误和消息提示区 -->
        <div id="messageBox" class="message-box"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- 左侧：输入区 -->
            <div>
                <label for="inputArea" class="block text-lg font-semibold mb-2 text-gray-700">{{ T "url.input.label" }}</label>
                <textarea id="inputArea" placeholder="{{ T "url.input.placeholder" }}"></textarea>
            </div>

            <!-- 右侧：输出区 -->
            <div>
                <label for="outputArea" class="block text-lg font-semibold mb-2 text-gray-700">{{ T "url.output.label" }}</label>
                <textarea id="outputArea" placeholder="{{ T "url.output.placeholder" }}"></textarea>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="flex flex-wrap justify-center md:justify-start space-x-4 mt-6">
            <button onclick="handleUrl(true)" class="tool-button bg-blue-600 text-white hover:bg-blue-700">
                🚀 {{ T "url.action.encode" }}
            </button>
            <button onclick="handleUrl(false)" class="tool-button bg-gray-500 text-white hover:bg-gray-600">
                🔏 {{ T "url.action.decode" }}
            </button>
            <button onclick="clearAll()" class="tool-button bg-gray-200 text-gray-800 hover:bg-gray-300">
                🧹 {{ T "url.action.clear" }}
            </button>
            <button onclick="copyOutput()" class="tool-button bg-gray-200 text-gray-800 hover:bg-gray-300">
                📋 {{ T "url.action.copy" }}
            </button>
        </div>

        <div class="mt-6 p-4 bg-yellow-50 border border-yellow-200 rounded-lg text-sm text-yellow-800">
            <p class="font-bold mb-1">💡 {{ T "url.notice.title" }}</p>
            <ul class="list-disc list-inside">
                <li>{{ T "url.notice.item1" }}</li>
                <li>{{ T "url.notice.item2" }}</li>
            </ul>
        </div>
    </div>
</div>

<style>
    .tool-container {
        max-width: 1000px;
        margin: 40px auto;
        padding: 20px;
    }

    textarea {
        width: 100%;
        height: 200px;
        padding: 1rem;
        border: 2px solid #E0E0E0;
        border-radius: var(--border-radius);
        font-family: monospace;
        font-size: 0.95rem;
        resize: none;
        outline: none;
        transition: border-color 0.2s;
        background-color: #F8F9FA;
    }

    textarea:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(30, 136, 229, 0.2);
    }

    .card-content {
        background-color: var(--card-background-base);
        padding: 1.5rem;
        border-radius: var(--border-radius);
        box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
        backdrop-filter: blur(5px);
        border: 1px solid #E0E0E0;
    }

    .tool-button {
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        font-weight: 600;
        transition: all 0.2s;
        border: none;
        cursor: pointer;
    }

    .tool-button:hover {
        box-shadow: 0 4px 8px rgba(30, 136, 229, 0.4);
        transform: translateY(-1px);
    }

    /* 消息提示框 */
    .message-box {
        padding: 1rem;
        border-radius: var(--border-radius);
        margin-bottom: 1rem;
        font-weight: 500;
        display: none;
    }

    .message-box.error {
        background-color: #FEE2E2;
        color: #EF4444;
        border: 1px solid #FCA5A5;
    }

    .message-box.info {
        background-color: #E3F2FD;
        color: #1E88E5;
        border: 1px solid #90CAF9;
    }
</style>

<script>
    const i18n = {
        emptyInput: '{{ T "url.message.emptyInput" }}',
        encodeSuccess: '{{ T "url.message.encodeSuccess" }}',
        decodeSuccess: '{{ T "url.message.decodeSuccess" }}',
        invalidInput: '{{ T "url.message.invalidInput" }}',
        cleared: '{{ T "url.message.cleared" }}',
        copyEmpty: '{{ T "url.message.copyEmpty" }}',
        copySuccess: '{{ T "url.message.copySuccess" }}'
    };

    const inputArea = document.getElementById('inputArea');
    const outputArea = document.getElementById('outputArea');
    const messageBox = document.getElementById('messageBox');

    /**
     * 显示消息提示
     */
    function showMessage(message, type = 'info') {
        messageBox.textContent = message;
        messageBox.className = 'message-box'; // 重置类
        messageBox.classList.add(type);
        messageBox.style.display = 'block';

        setTimeout(() => {
            messageBox.style.display = 'none';
        }, 5000);
    }

    /**
     * 处理 URL 编码或解码
     * @param {boolean} isEncode - true 表示编码，false 表示解码
     */
    function handleUrl(isEncode) {
        messageBox.style.display = 'none';
        const input = inputArea.value.trim();

        if (!input) {
            showMessage(i18n.emptyInput, 'error');
            return;
        }

        try {
            let result;
            if (isEncode) {
                // 使用 encodeURIComponent 处理查询参数或路径段
                result = encodeURIComponent(input);
                showMessage(i18n.encodeSuccess, 'info');
            } else {
                // 使用 decodeURIComponent 解码
                result = decodeURIComponent(input);
                showMessage(i18n.decodeSuccess, 'info');
            }
            outputArea.value = result;

        } catch (e) {
            // 捕获无效 URL 编码字符或 URI 异常
            showMessage(i18n.invalidInput, 'error');
            console.error("URL Encoding/Decoding Error:", e);
            outputArea.value = "";
        }
    }

    /**
     * 清空所有输入和输出
     */
    function clearAll() {
        inputArea.value = "";
        outputArea.value = "";
        messageBox.style.display = 'none';
        showMessage(i18n.cleared, 'info');
    }

    /**
     * 复制输出结果到剪贴板
     */
    function copyOutput() {
        const output = outputArea.value;
        if (!output) {
            showMessage(i18n.copyEmpty, 'error');
            return;
        }

        // 复制到剪贴板
        outputArea.select();
        document.execCommand('copy');
        outputArea.setSelectionRange(0, 0); // 取消选中

        showMessage(i18n.copySuccess, 'info');
    }
</script>
{{ end }}
